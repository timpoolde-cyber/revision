<script>
const projectData = {
  id: <?= $currentProjectId ?>,
  firma: '<?= htmlspecialchars(addslashes($project['customer_name'])) ?>',
  adresse: '<?= htmlspecialchars(addslashes($project['address'] ?? '')) ?>',
  plzOrt: '<?= htmlspecialchars(addslashes(($project['postal_code'] ?? '') . ' ' . ($project['city'] ?? ''))) ?>',
  baseValue: <?= (float)($project['budget'] ?? 0) ?>,
  rechnungsNr: 'INV-' + new Date().getFullYear() + '-' + String(projectData?.id || <?= $currentProjectId ?>).padStart(4, '0')
};

function updateInvoicePreview() {
  const isKleinunternehmer = document.getElementById('chkUstg').checked;
  const isVorkasse = document.getElementById('chkVorkasse').checked;
  const contactSelect = document.getElementById('contactSelect');
  
  let valueStr = document.getElementById('projectValueInput').value.replace(',', '.');
  let currentVal = parseFloat(valueStr) || 0;
  
  let recipientName = projectData.firma;
  if (contactSelect.value !== 'default') {
    const selectedOption = contactSelect.options[contactSelect.selectedIndex];
    recipientName = projectData.firma + '\nz.Hd. ' + selectedOption.getAttribute('data-name');
  }

  let calculationsHtml = '';
  if (isKleinunternehmer) {
    calculationsHtml = `
Zwischensumme:          ${currentVal.toFixed(2)} €
Umsatzsteuer (0%):       0,00 €
---------------------------------
Gesamtbetrag:           ${currentVal.toFixed(2)} €

Gemäß § 19 UStG wird keine Umsatzsteuer berechnet.`;
  } else {
    let net = currentVal / 1.19;
    let mwst = currentVal - net;
    calculationsHtml = `
Zwischensumme (Netto):  ${net.toFixed(2)} €
Umsatzsteuer (19%):     ${mwst.toFixed(2)} €
---------------------------------
Gesamtbetrag (Brutto):  ${currentVal.toFixed(2)} €`;
  }

  let paymentText = isVorkasse 
    ? 'Zahlungsart: Vorkasse\nBitte überweisen Sie den Betrag vor Beginn der Umsetzung auf das angegebene Geschäftskonto.' 
    : 'Zahlungsziel: 14 Tage netto nach Erhalt der Rechnung ohne Abzug.';

  document.getElementById('invoicePreview').innerHTML = `
<strong>RECHNUNG</strong>
Nr: ${projectData.rechnungsNr}
Datum: ${new Date().toLocaleDateString('de-DE')}

<strong>Empfänger:</strong>
${recipientName}
${projectData.adresse}
${projectData.plzOrt}

-------------------------------------------------
Position: Revision100™ Code-Leistungsrevison 1,00x
-------------------------------------------------
${calculationsHtml}

${paymentText}
  `.trim().replace(/\n/g, '<br>');
}

async function generateAndSendInvoice() {
  const isKleinunternehmer = document.getElementById('chkUstg').checked;
  const isVorkasse = document.getElementById('chkVorkasse').checked;
  const contactSelect = document.getElementById('contactSelect');
  
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Verarbeite...';

  try {
    const response = await fetch('api.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'generate_invoice_email',
        project_id: projectData.id,
        is_ustg: isKleinunternehmer,
        is_vorkasse: isVorkasse,
        contact_id: contactSelect.value,
        rechnungs_nr: projectData.rechnungsNr
      })
    });

    const result = await response.json();
    if (result.success) {
      alert('✓ PDF generiert und Rechnung per E-Mail versendet.');
    } else {
      alert('Fehler: ' + result.error);
    }
  } catch (e) {
    alert('Fehler bei der Übertragung: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'PDF Generieren & Rechnungsversand starten';
  }
}

// VisionControl
const phaseIndex = {anfrage:0, analyse:1, kontakt:2, beauftragung:3, umsetzung:4, abgeschlossen:5};
const colorPalettes = {
  green: ['#a3e4d7', '#7ed4c1', '#5cc4ab', '#3bb495', '#1fa47f', '#0d8659'],
  orange: ['#FFE4B5', '#FFD699', '#FFC87D', '#FFBA61', '#FFAB45', '#FF9529'],
  red: ['#FFB3B3', '#FF9999', '#FF7F7F', '#FF6565', '#FF4B4B', '#FF3131'],
  gray: ['#D3D3D3', '#BEBEBE', '#A9A9A9', '#949494', '#7F7F7F', '#696969']
};

function getAgeStatus(lastInteractionDate) {
  if (!lastInteractionDate) return 'green';
  const last = new Date(lastInteractionDate);
  const now = new Date();
  const days = Math.floor((now - last) / (1000 * 60 * 60 * 24));
  if (days >= 13) return 'gray';
  if (days >= 12) return 'red';
  if (days >= 7) return 'orange';
  return 'green';
}

function renderPhaseSquares() {
  const tunnel = '<?= htmlspecialchars($project['tunnel']) ?>';
  const lastInteractionDate = '<?= !empty($project['last_interaction_date']) ? htmlspecialchars($project['last_interaction_date']) : '' ?>';
  const phaseIdx = phaseIndex[tunnel] || 0;
  const status = getAgeStatus(lastInteractionDate);
  const colors = colorPalettes[status];
  const container = document.getElementById('statusSquares');
  container.innerHTML = '';

  for (let i = 0; i < 6; i++) {
    const square = document.createElement('div');
    square.className = 'status-square';
    square.style.background = i <= phaseIdx ? colors[i] : '#eee';
    square.style.color = i <= phaseIdx ? '#fff' : '#ccc';
    square.textContent = String(i + 1);
    container.appendChild(square);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  renderPhaseSquares();
  updateInvoicePreview();
  
  document.getElementById('projectValueInput').addEventListener('input', updateInvoicePreview);
});
</script>
