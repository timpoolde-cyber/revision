name: Deploy to One.com Sandbox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Ultra Fast Mirror via lftp
        run: |
          lftp -c "
          set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no';
          open -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} -p 22 sftp://${{ secrets.SFTP_SERVER }};
          mirror -Rx '^\.git/' -Rx '^\.github/' ./ /webroots/62bd938a;
          "
